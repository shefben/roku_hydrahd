<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HydraHD - brs-engine debug harness</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #ccc;
      font-family: Consolas, "Courier New", monospace;
      overflow: hidden;
    }
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    /* The engine renders the channel at its native resolution into this canvas;
       CSS scales it to fit the window while preserving aspect ratio. */
    #display {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      background: #000;
      image-rendering: auto;
    }
    #player { display: none; }
    #status {
      position: fixed;
      left: 6px;
      bottom: 4px;
      font-size: 12px;
      color: #4ad;
      background: rgba(0,0,0,0.55);
      padding: 2px 6px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 10;
      white-space: pre;
    }
    /* Hidden during automated runs; toggled by ?status=1 */
    body:not(.show-status) #status { display: none; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="display" width="1920" height="1080"></canvas>
    <video id="player" crossorigin="anonymous"></video>
  </div>
  <div id="status">booting…</div>

  <!-- brs-engine API (UMD global: window.brs) -->
  <script src="lib/brs.api.js"></script>
  <!-- harness: init + run + automation hooks -->
  <script src="app.js"></script>
</body>
</html>
